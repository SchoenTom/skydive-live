<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" role="img" aria-label="When the jumper turns head-first, a single antenna loses the picture; the second antenna keeps it alive.">
<defs>
  <linearGradient id="hsky" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0b2233"/><stop offset=".6" stop-color="#0a1a1f"/><stop offset="1" stop-color="#0a1512"/></linearGradient>
  <linearGradient id="hbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0c1320"/><stop offset="1" stop-color="#0a0e16"/></linearGradient>
  <style>
    .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}.sans{font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
    @keyframes spin{0%,20%{transform:rotate(0deg)}42%{transform:rotate(95deg)}55%,100%{transform:rotate(180deg)}}
    @keyframes barw{0%,20%{transform:scaleX(.98)}38%{transform:scaleX(.5)}50%,66%{transform:scaleX(.03)}72%{transform:scaleX(.86)}100%{transform:scaleX(.86)}}
    @keyframes barcol{0%,20%{fill:#22d3ee}38%{fill:#edab28}50%,66%{fill:#ef5a4f}72%,100%{fill:#22d3ee}}
    @keyframes sGood{0%,30%{opacity:1}40%,100%{opacity:0}}
    @keyframes sLost{0%,46%{opacity:0}52%,64%{opacity:1}70%,100%{opacity:0}}
    @keyframes sFix{0%,68%{opacity:0}76%,100%{opacity:1}}
    @keyframes dipole{0%,60%{opacity:0}72%,100%{opacity:.9}}
    @keyframes patchb{0%,20%{opacity:.9;stroke:#22d3ee}40%{stroke:#edab28}50%,66%{opacity:.15;stroke:#ef5a4f}72%,100%{opacity:.2;stroke:#2f5a3f}}
    #jp{animation:spin 8s ease-in-out infinite;transform-origin:170px 150px}
    #bar{animation:barw 8s ease-in-out infinite;transform-origin:left center}
    #bar{fill:#22d3ee;animation:barw 8s ease-in-out infinite, barcol 8s ease-in-out infinite}
    #sGood{animation:sGood 8s infinite}#sLost{animation:sLost 8s infinite}#sFix{animation:sFix 8s infinite}
    #beamD{animation:dipole 8s ease-in-out infinite}#beamP{animation:patchb 8s ease-in-out infinite}
  </style>
</defs>
<rect width="900" height="320" fill="url(#hbg)"/>
<!-- stage -->
<rect x="24" y="40" width="300" height="256" rx="16" fill="url(#hsky)" stroke="rgba(159,196,226,.16)"/>
<text x="40" y="66" class="mono" font-size="12" letter-spacing="2" fill="#9fc4e2">FREEFALL</text>
<!-- ground station -->
<g><path d="M158 268 a16 16 0 0 1 32 0" fill="none" stroke="#67e8f9" stroke-width="2" opacity=".5"/><circle cx="174" cy="268" r="5" fill="#67e8f9"/></g>
<!-- beams -->
<path id="beamP" d="M170 156 Q150 220 174 266" fill="none" stroke="#22d3ee" stroke-width="6" opacity=".9"/>
<path id="beamD" d="M178 150 Q210 210 174 266" fill="none" stroke="#4ec3ec" stroke-width="6" opacity="0"/>
<!-- jumper (simple belly-flyer icon) -->
<g id="jp">
  <g fill="none" stroke="#3a4350" stroke-width="15" stroke-linecap="round">
    <path d="M156 132 L132 120 L126 96"/><path d="M184 132 L208 120 L214 96"/>
    <path d="M160 176 L138 196 L150 168"/><path d="M180 176 L202 196 L190 168"/>
  </g>
  <path d="M150 128 C146 146 150 166 158 178 L182 178 C190 166 194 146 190 128 Q170 120 150 128 Z" fill="#2b323d"/>
  <ellipse cx="170" cy="112" rx="17" ry="16" fill="#697585"/>
  <rect x="160" y="96" width="20" height="9" rx="2.4" fill="#0e1418" stroke="#22d3ee" stroke-width="1"/>
  <path d="M156 110 q14 9 28 0" fill="none" stroke="#9fd8ec" stroke-width="2" opacity=".6"/>
</g>

<!-- right: link + status -->
<text x="372" y="92" class="sans" font-size="24" font-weight="800" fill="#f4f7fb">One antenna drops. Two don't.</text>
<text x="372" y="124" class="sans" font-size="15" fill="#aebdce">Turn head-first and your own body blocks the antenna —</text>
<text x="372" y="146" class="sans" font-size="15" fill="#aebdce">the second one takes over before the picture can break.</text>
<!-- link bar -->
<text x="372" y="208" class="mono" font-size="13" letter-spacing="2" fill="#aebdce">LINK</text>
<rect x="372" y="218" width="404" height="16" rx="8" fill="rgba(255,255,255,.1)"/>
<rect id="bar" x="372" y="218" width="404" height="16" rx="8"/>
<!-- status lines (cross-fade) -->
<g class="sans" font-size="17" font-weight="800">
  <text id="sGood" x="372" y="270" fill="#67e8f9">● LIVE — belly, image holds</text>
  <text id="sLost" x="372" y="270" fill="#ef5a4f">✕ SIGNAL LOST — body in the way</text>
  <text id="sFix"  x="372" y="270" fill="#67e8f9">● LIVE — second antenna takes over</text>
</g>
</svg>
