<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 340" width="840" height="340" role="img" aria-label="Self-thinking cooling: a sensor runs the fan only when the chip is hot; in freefall the ram-air cools it for free.">
<defs>
  <linearGradient id="cbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0c1320"/><stop offset="1" stop-color="#0a0e16"/></linearGradient>
  <style>
    .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}.sans{font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes blink{0%,55%{opacity:1}56%,100%{opacity:.3}}
    #fan{animation:spin 1.1s linear infinite;transform-origin:705px 250px}
    #ram{animation:blink 1.4s steps(1) infinite}
  </style>
</defs>
<rect width="840" height="340" fill="url(#cbg)"/>
<text x="40" y="46" class="mono" font-size="15" letter-spacing="3" fill="#7186a0">SELF-THINKING COOLING</text>

<!-- plot area -->
<rect x="60" y="74" width="720" height="170" rx="10" fill="rgba(255,255,255,.02)" stroke="rgba(255,255,255,.08)"/>
<!-- thresholds -->
<line x1="60" y1="110" x2="780" y2="110" stroke="#ef8a7f" stroke-dasharray="5 6" opacity=".7"/>
<text x="72" y="104" class="mono" font-size="11" fill="#ef8a7f">▲ 45°C · fan ON</text>
<line x1="60" y1="150" x2="780" y2="150" stroke="#67e8f9" stroke-dasharray="5 6" opacity=".6"/>
<text x="72" y="166" class="mono" font-size="11" fill="#67e8f9">▼ 40°C · fan OFF</text>
<!-- temp curve over phases -->
<polyline points="80,200 180,150 300,104 360,118 470,210 560,206 660,120 760,196"
  fill="none" stroke="#edab28" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
<!-- freefall ram-air band -->
<rect x="360" y="74" width="110" height="170" fill="rgba(34,211,238,.06)"/>
<g id="ram" stroke="#22d3ee" stroke-width="2.5" stroke-linecap="round" opacity=".9">
  <path d="M392 96 v40 M386 128 l6 8 6 -8"/><path d="M438 96 v40 M432 128 l6 8 6 -8"/></g>
<text x="415" y="92" class="mono" font-size="10" fill="#67e8f9" text-anchor="middle">RAM-AIR</text>
<!-- spinning fan near post-run -->
<g id="fan" fill="none" stroke="#9fc4e2" stroke-width="2.5">
  <circle cx="705" cy="250" r="0.1"/></g>
<g transform="translate(705,250)"><g id="fan2"><circle r="14" fill="none" stroke="#3a4658" stroke-width="2"/>
  <path d="M0 0 C8 -4 12 -10 6 -13 C2 -8 0 -4 0 0Z" fill="#9fc4e2"/>
  <path d="M0 0 C4 8 10 12 13 6 C8 2 4 0 0 0Z" fill="#9fc4e2"/>
  <path d="M0 0 C-8 4 -12 10 -6 13 C-2 8 0 4 0 0Z" fill="#9fc4e2"/>
  <path d="M0 0 C-4 -8 -10 -12 -13 -6 C-8 -2 -4 0 0 0Z" fill="#9fc4e2"/></g></g>
<style>#fan2{animation:spin 1.1s linear infinite;transform-origin:0 0}</style>

<!-- phase labels -->
<g class="mono" font-size="11" fill="#9fc4e2" text-anchor="middle">
  <text x="110" y="266">Boarding</text><text x="220" y="266">Climb</text><text x="345" y="266">Exit</text>
  <text x="415" y="266">Freefall</text><text x="520" y="266">Canopy</text><text x="620" y="266">Landing</text><text x="720" y="266">Post-run</text>
</g>
<!-- fan ON/OFF band -->
<rect x="60" y="278" width="300" height="20" rx="5" fill="rgba(237,171,40,.18)"/><text x="210" y="292" class="mono" font-size="11" fill="#edab28" text-anchor="middle">FAN ON when hot</text>
<rect x="360" y="278" width="110" height="20" rx="5" fill="rgba(34,211,238,.14)"/><text x="415" y="292" class="mono" font-size="10" fill="#67e8f9" text-anchor="middle">free cooling</text>
<rect x="640" y="278" width="140" height="20" rx="5" fill="rgba(237,171,40,.18)"/><text x="710" y="292" class="mono" font-size="11" fill="#edab28" text-anchor="middle">runs on, then off</text>

<text x="40" y="326" class="sans" font-size="16" fill="#aebdce">A sensor runs the fan <tspan fill="#f4f7fb" font-weight="700">only when it's hot</tspan> — in freefall the ram-air does it for free (ΔT ≈ 6 K). <tspan fill="#22d3ee">Never on a timer.</tspan></text>
</svg>
