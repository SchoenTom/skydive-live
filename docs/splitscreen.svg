<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 580" width="1040" height="580" role="img" aria-label="Several jumpers received at once, shown side by side in a splitscreen on one drop-zone screen.">
<defs>
  <linearGradient id="ssbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0c1320"/><stop offset="1" stop-color="#0a0e16"/></linearGradient>
  <linearGradient id="pv" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#1b4e7e"/><stop offset=".40" stop-color="#3f86bf"/><stop offset=".50" stop-color="#cfe3f0"/><stop offset=".54" stop-color="#9fb877"/><stop offset="1" stop-color="#2e4a2c"/></linearGradient>
  <g id="fly">
    <g fill="none" stroke="#2a3340" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
      <path d="M112,104 L72,86 L62,50"/><path d="M148,104 L188,86 L198,50"/>
      <path d="M118,176 L80,206 L66,172"/><path d="M142,176 L180,206 L194,172"/></g>
    <path d="M103,98 C95,126 102,158 113,180 L147,180 C158,158 165,126 157,98 Q130,87 103,98 Z" fill="#2a3340"/>
    <ellipse cx="130" cy="62" rx="26" ry="24" fill="#3c4856"/>
    <rect x="116" y="40" width="28" height="12" rx="3" fill="#0e1418" stroke="#22d3ee" stroke-width="1.6"/>
    <g fill="none" stroke="#dff1fb" stroke-width="2.4" stroke-linecap="round" opacity=".5"><path d="M110,101 L74,85"/><path d="M150,101 L186,85"/></g>
  </g>
  <style>
    .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}.sans{font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
    @keyframes bl{0%,55%{opacity:1}56%,100%{opacity:.2}}
    @keyframes fa{0%,100%{transform:translate(0,0)}50%{transform:translate(-8px,7px)}}
    @keyframes fb{0%,100%{transform:translate(0,0)}50%{transform:translate(9px,6px)}}
    .rec{animation:bl 1.4s steps(1) infinite}
  </style>
</defs>
<rect width="1040" height="580" fill="url(#ssbg)"/>
<text x="40" y="46" class="mono" font-size="15" letter-spacing="3" fill="#7186a0">ONE SCREEN · THE WHOLE TEAM</text>

<!-- TV bezel -->
<rect x="40" y="66" width="960" height="476" rx="16" fill="#0e151f" stroke="rgba(255,255,255,.14)"/>
<!-- 2x2 splitscreen of POV feeds -->
<g>
  <!-- cell template: bg gradient + flyer + label -->
  <!-- C1 -->
  <g id="c1"><clipPath id="k1"><rect x="54" y="80" width="461" height="222" rx="6"/></clipPath>
    <g clip-path="url(#k1)"><rect x="54" y="80" width="461" height="222" fill="url(#pv)"/>
      <ellipse cx="160" cy="130" rx="70" ry="14" fill="#fff" opacity=".4"/>
      <use href="#fly" transform="translate(220,131) scale(0.5)"/></g>
    <text x="66" y="100" class="mono" font-size="11" fill="#fff">● CAM 1 · BELLY</text></g>
  <!-- C2 -->
  <g id="c2"><clipPath id="k2"><rect x="525" y="80" width="461" height="222" rx="6"/></clipPath>
    <g clip-path="url(#k2)"><rect x="525" y="80" width="461" height="222" fill="url(#pv)"/>
      <ellipse cx="720" cy="120" rx="80" ry="15" fill="#fff" opacity=".32"/>
      <use href="#fly" transform="translate(696,137) scale(0.45)"/></g>
    <text x="537" y="100" class="mono" font-size="11" fill="#fff">● CAM 2 · SIT</text></g>
  <!-- C3 -->
  <g id="c3"><clipPath id="k3"><rect x="54" y="312" width="461" height="222" rx="6"/></clipPath>
    <g clip-path="url(#k3)"><rect x="54" y="312" width="461" height="222" fill="url(#pv)"/>
      <ellipse cx="200" cy="360" rx="75" ry="14" fill="#fff" opacity=".35"/>
      <use href="#fly" transform="translate(220,363) scale(0.5) rotate(180 130 120)"/></g>
    <text x="66" y="332" class="mono" font-size="11" fill="#fff">● CAM 3 · HEAD-DOWN</text></g>
  <!-- C4 -->
  <g id="c4"><clipPath id="k4"><rect x="525" y="312" width="461" height="222" rx="6"/></clipPath>
    <g clip-path="url(#k4)"><rect x="525" y="312" width="461" height="222" fill="url(#pv)"/>
      <ellipse cx="760" cy="356" rx="70" ry="13" fill="#fff" opacity=".3"/>
      <use href="#fly" transform="translate(696,369) scale(0.45)"/></g>
    <text x="537" y="332" class="mono" font-size="11" fill="#fff">● CAM 4 · BACKFLY</text></g>
  <!-- dividers -->
  <line x1="520" y1="80" x2="520" y2="534" stroke="#0e151f" stroke-width="6"/>
  <line x1="54" y1="307" x2="986" y2="307" stroke="#0e151f" stroke-width="6"/>
  <line x1="520" y1="80" x2="520" y2="534" stroke="rgba(34,211,238,.35)" stroke-width="1"/>
  <line x1="54" y1="307" x2="986" y2="307" stroke="rgba(34,211,238,.35)" stroke-width="1"/>
</g>
<!-- HUD overlay -->
<g class="mono" font-size="13" font-weight="700">
  <g class="rec"><circle cx="958" cy="92" r="5" fill="#ef5a4f"/></g>
  <text x="950" y="97" text-anchor="end" fill="#fff">4 STREAMS</text>
</g>
<text x="40" y="572" class="sans" font-size="17" fill="#aebdce">Each jumper on their own channel → several receivers → <tspan fill="#22d3ee" font-weight="700">one splitscreen</tspan>. The whole 4-way, live, on one screen.</text>
</svg>
