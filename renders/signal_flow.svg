<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 260" width="1080" height="260" role="img" aria-label="The signal's journey: helmet camera, 1-watt transmitter, antenna, 4 km of air, ground antennas, receiver, HDMI, to the big TV in the waiting area.">
<defs>
  <linearGradient id="fbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0c1320"/><stop offset="1" stop-color="#0a0e16"/></linearGradient>
  <style>
    .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}.sans{font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
    .node{fill:#0f1827;stroke:rgba(255,255,255,.12)}
    .lbl{font-family:ui-monospace,Menlo,monospace;font-size:11px;fill:#9fc4e2;text-anchor:middle;letter-spacing:.5px}
    .ic{fill:none;stroke:#cfe0ec;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
    @keyframes travel{0%{transform:translateX(0);opacity:0}5%{opacity:1}95%{opacity:1}100%{transform:translateX(902px);opacity:0}}
    @keyframes tvon{0%,82%{opacity:0}90%,100%{opacity:1}}
    @keyframes dash{to{stroke-dashoffset:-28}}
    #pkt{animation:travel 4.5s linear infinite}
    #tvfeed{animation:tvon 4.5s linear infinite}
    .gap{stroke-dasharray:7 7;animation:dash 1s linear infinite}
  </style>
</defs>
<rect width="1080" height="260" fill="url(#fbg)"/>
<text x="40" y="44" class="mono" font-size="15" letter-spacing="3" fill="#7186a0">FROM FREEFALL TO THE WAITING-ROOM TV</text>

<!-- baseline path -->
<line x1="96" y1="138" x2="998" y2="138" stroke="rgba(255,255,255,.12)" stroke-width="2"/>
<line x1="430" y1="138" x2="610" y2="138" stroke="#22d3ee" stroke-width="2" class="gap" opacity=".5"/>

<!-- nodes -->
<!-- 1 camera/helmet -->
<g><rect class="node" x="60" y="110" width="76" height="56" rx="10"/>
 <circle class="ic" cx="98" cy="138" r="10"/><circle cx="98" cy="138" r="4" fill="#22d3ee"/>
 <text class="lbl" x="98" y="190">CAMERA</text></g>
<!-- 2 VTX -->
<g><rect class="node" x="170" y="110" width="76" height="56" rx="10"/>
 <rect class="ic" x="192" y="124" width="32" height="28" rx="3"/><path class="ic" d="M208 124 v-8 M201 116 h14"/>
 <text class="lbl" x="208" y="190">1 W RADIO</text></g>
<!-- 3 antenna -->
<g><rect class="node" x="280" y="110" width="76" height="56" rx="10"/>
 <path class="ic" d="M318 152 v-18 M306 134 a16 16 0 0 1 24 0 M300 130 a24 24 0 0 1 36 0"/>
 <text class="lbl" x="318" y="190">ANTENNA</text></g>
<!-- gap label -->
<text class="lbl" x="520" y="120" fill="#67e8f9">~ 4 km of air</text>
<text class="lbl" x="520" y="190" fill="#7186a0">own radio link · no internet</text>
<!-- 4 ground antennas -->
<g><rect class="node" x="624" y="110" width="80" height="56" rx="10"/>
 <path class="ic" d="M652 152 v-16 M676 152 v-16 M644 136 a8 8 0 0 1 16 0 M668 136 a8 8 0 0 1 16 0"/>
 <text class="lbl" x="664" y="190">GROUND RX</text></g>
<!-- 5 monitor -->
<g><rect class="node" x="728" y="110" width="76" height="56" rx="10"/>
 <rect class="ic" x="748" y="122" width="36" height="24" rx="2"/><path class="ic" d="M760 146 v6 M752 154 h16"/>
 <text class="lbl" x="766" y="190">MONITOR</text></g>
<!-- HDMI -->
<text class="lbl" x="846" y="120" fill="#9fc4e2">HDMI</text>
<!-- 6 TV with spectators -->
<g><rect class="node" x="898" y="96" width="100" height="70" rx="8"/>
 <rect x="910" y="106" width="76" height="44" rx="3" fill="#0a1018"/>
 <g id="tvfeed"><rect x="910" y="106" width="76" height="44" rx="3" fill="#1d6b6f"/>
   <rect x="910" y="129" width="76" height="21" fill="#4f7444"/><circle cx="948" cy="120" r="6" fill="#bfe0f0" opacity=".7"/></g>
 <!-- spectators -->
 <g fill="#3a4658"><circle cx="922" cy="176" r="6"/><rect x="916" y="182" width="12" height="14" rx="4"/>
   <circle cx="948" cy="174" r="7"/><rect x="941" y="181" width="14" height="16" rx="4"/>
   <circle cx="974" cy="176" r="6"/><rect x="968" y="182" width="12" height="14" rx="4"/></g>
 <text class="lbl" x="948" y="216" fill="#cfe0ec">TV · WAITING AREA</text></g>

<!-- traveling packet + 14ms tag -->
<g id="pkt"><circle cx="96" cy="138" r="6" fill="#22d3ee"/><circle cx="96" cy="138" r="12" fill="#22d3ee" opacity=".25"/>
 <text x="96" y="118" class="mono" font-size="11" fill="#67e8f9" text-anchor="middle">14 ms</text></g>
</svg>
