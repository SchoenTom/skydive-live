<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 360" width="680" height="360" role="img" aria-label="The ground station listens on two antennas — a wide omni and a directional patch — and always uses the stronger one. Lose one, the other holds.">
<defs>
  <linearGradient id="dbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#0c1320"/><stop offset="1" stop-color="#0a0e16"/></linearGradient>
  <radialGradient id="omni" cx="50%" cy="62%" r="55%"><stop offset="0" stop-color="rgba(103,232,249,.18)"/><stop offset="1" stop-color="transparent"/></radialGradient>
  <style>
    .mono{font-family:ui-monospace,"SF Mono",Menlo,monospace}.sans{font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
    @keyframes pa{0%,46%{opacity:1}54%,96%{opacity:.18}100%{opacity:1}}
    @keyframes pb{0%,46%{opacity:.18}54%,96%{opacity:1}100%{opacity:.18}}
    @keyframes win{0%,46%{transform:translateX(-58px)}54%,96%{transform:translateX(58px)}100%{transform:translateX(-58px)}}
    #lobeP{animation:pa 5s ease-in-out infinite}#lobeO{animation:pb 5s ease-in-out infinite}
    #winner{animation:win 5s ease-in-out infinite}
  </style>
</defs>
<rect width="680" height="360" fill="url(#dbg)"/>
<text x="40" y="46" class="mono" font-size="15" letter-spacing="3" fill="#7186a0">TWO SAFEGUARDS AT THE GROUND, TOO</text>

<!-- jumper up top -->
<circle cx="340" cy="92" r="7" fill="#dfe9f2"/><text x="340" y="78" class="mono" font-size="11" fill="#cfe0ec" text-anchor="middle">JUMPER · 4 km up</text>

<!-- omni broad coverage -->
<g id="lobeO"><ellipse cx="340" cy="300" rx="220" ry="150" fill="url(#omni)"/>
  <ellipse cx="340" cy="300" rx="220" ry="150" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity=".35"/></g>
<!-- patch directional cone -->
<g id="lobeP"><path d="M340 300 L262 120 Q340 96 418 120 Z" fill="rgba(34,211,238,.14)" stroke="#22d3ee" stroke-width="1.5" opacity=".6"/></g>

<!-- station -->
<rect x="300" y="286" width="80" height="52" rx="6" fill="#16202e" stroke="#5a6e7c" stroke-width="2"/>
<rect x="312" y="296" width="56" height="32" rx="3" fill="#1d6b6f"/>
<line x1="300" y1="286" x2="288" y2="250" stroke="#5a6e7c" stroke-width="3"/><circle cx="288" cy="246" r="5" fill="#67e8f9"/>
<line x1="380" y1="286" x2="392" y2="250" stroke="#5a6e7c" stroke-width="3"/><circle cx="392" cy="246" r="5" fill="#67e8f9"/>
<text x="246" y="250" class="mono" font-size="11" fill="#9fc4e2" text-anchor="end">OMNI</text>
<text x="434" y="250" class="mono" font-size="11" fill="#9fc4e2">PATCH</text>

<!-- 'stronger wins' selector -->
<g id="winner"><rect x="316" y="340" width="48" height="3" rx="1.5" fill="#22d3ee"/></g>
<text x="340" y="334" class="mono" font-size="10" fill="#67e8f9" text-anchor="middle">stronger source wins</text>

<text x="40" y="356" class="sans" font-size="15" fill="#aebdce">Wide <tspan fill="#67e8f9">omni</tspan> + aimed <tspan fill="#22d3ee">patch</tspan> — the receiver always takes the stronger one. <tspan fill="#f4f7fb" font-weight="700">Lose one, the picture still gets through.</tspan></text>
</svg>
